# Simplified docker-compose for local development
# Run with: docker-compose -f docker-compose.dev.yml up

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"  # Using 5001 to avoid conflict with macOS AirPlay
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/insurance-claims
      - AI_DAMAGE_SERVICE_URL=http://host.docker.internal:8000
      - AI_COST_SERVICE_URL=http://host.docker.internal:8001
      - AI_FRAUD_SERVICE_URL=http://host.docker.internal:8002
      - AI_REPORT_SERVICE_URL=http://host.docker.internal:8003
    depends_on:
      - mongodb
    volumes:
      - ./backend/src:/app/src
    networks:
      - insurance-network

  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"  # Using 27018 externally to avoid conflict with local MongoDB
    volumes:
      - mongodb_data:/data/db
    networks:
      - insurance-network

volumes:
  mongodb_data:

networks:
  insurance-network:
    driver: bridge
