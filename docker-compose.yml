services:
  frontend:
    build: ./frontend/web-app
    ports:
      - "3000:3000"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/insurance-claims
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - AI_DAMAGE_SERVICE_URL=http://ai-damage-service:8000
      - AI_COST_SERVICE_URL=http://ai-cost-service:8001
      - AI_FRAUD_SERVICE_URL=http://ai-fraud-service:8002
      - AI_REPORT_SERVICE_URL=http://ai-report-service:8003
    depends_on:
      - mongodb
    networks:
      - insurance-network

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - insurance-network

  # AI Services (placeholder - will be implemented separately)
  ai-damage-service:
    build: ./ai-services/damage-detection
    ports:
      - "8000:8000"
    networks:
      - insurance-network

  ai-cost-service:
    build: ./ai-services/cost-estimation
    ports:
      - "8001:8001"
    networks:
      - insurance-network

  ai-fraud-service:
    build: ./ai-services/fraud-detection
    ports:
      - "8002:8002"
    networks:
      - insurance-network

  ai-report-service:
    build: ./ai-services/report-generation
    ports:
      - "8003:8003"
    networks:
      - insurance-network

volumes:
  mongodb_data:

networks:
  insurance-network:
    driver: bridge
